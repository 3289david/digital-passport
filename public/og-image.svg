<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07080d"/>
      <stop offset="100%" style="stop-color:#0d0f18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4361ee"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4361ee;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#4361ee;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="315" rx="500" ry="400" fill="url(#glow)"/>

  <!-- Grid lines -->
  <g opacity="0.12" stroke="#4361ee" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Logo -->
  <rect x="80" y="80" width="48" height="48" rx="12" fill="url(#accent)"/>
  <rect x="90" y="92" width="28" height="22" rx="3" fill="none" stroke="white" stroke-width="2"/>
  <line x1="95" y1="99" x2="113" y2="99" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="95" y1="104" x2="109" y2="104" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="95" y1="109" x2="106" y2="109" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="113" cy="109" r="4" fill="#10b981"/>

  <!-- Brand name -->
  <text x="144" y="111" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#e8eaf4">Digital Passport</text>

  <!-- Domain -->
  <text x="80" y="570" font-family="ui-monospace, monospace" font-size="16" fill="#4361ee">p.krl.kr</text>

  <!-- Main headline -->
  <text x="80" y="240" font-family="system-ui, sans-serif" font-size="72" font-weight="700" fill="#e8eaf4">Your developer</text>
  <text x="80" y="330" font-family="system-ui, sans-serif" font-size="72" font-weight="700" fill="url(#accent)">identity, verified.</text>

  <!-- Sub -->
  <text x="80" y="400" font-family="system-ui, sans-serif" font-size="24" fill="#8b92a8">One passport across every platform you build on.</text>

  <!-- Trust score card -->
  <rect x="820" y="160" width="300" height="300" rx="20" fill="#0d0f18" stroke="#1c2035" stroke-width="1.5"/>
  <text x="970" y="210" font-family="system-ui, sans-serif" font-size="13" fill="#8b92a8" text-anchor="middle">TRUST SCORE</text>
  <text x="970" y="290" font-family="ui-monospace, monospace" font-size="64" font-weight="700" fill="#4361ee" text-anchor="middle">962</text>
  <text x="970" y="320" font-family="system-ui, sans-serif" font-size="14" fill="#10b981" text-anchor="middle">Elite — Top 2%</text>
  <rect x="840" y="350" width="260" height="36" rx="8" fill="#131520"/>
  <circle cx="865" cy="368" r="5" fill="#10b981"/>
  <text x="877" y="373" font-family="ui-monospace, monospace" font-size="13" fill="#4a506a">dev://danu</text>
</svg>
